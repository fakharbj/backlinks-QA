upstream linksentinel_api {
    server api:8000;
}

upstream linksentinel_frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 64m;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://linksentinel_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://linksentinel_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://linksentinel_api/openapi.json;
        proxy_set_header Host $host;
    }

    location /healthz {
        proxy_pass http://linksentinel_api/healthz;
    }

    location /readyz {
        proxy_pass http://linksentinel_api/readyz;
    }

    location / {
        proxy_pass http://linksentinel_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
